site_name: "Dalva Documentation"
site_description: "Lightweight experiment tracker for deep learning"
site_url: "https://github.com/tuliosouza99/Dalva"
repo_url: "https://github.com/tuliosouza99/Dalva"
repo_name: "tuliosouza99/Dalva"
edit_uri: "blob/main/docs/"

theme:
  name: "material"
  favicon: assets/logo.svg
  logo: assets/logo.svg
  features:
    - navigation.tabs
    - navigation.top
    - navigation.path
    - navigation.sections
    - announce.dismiss
    - content.code.copy
    - content.code.annotate
    - content.actions.view
  palette:
    - media: "(prefers-color-scheme)"
      primary: black
      toggle:
        icon: material/brightness-auto
        name: Switch to light mode

    - media: "(prefers-color-scheme: light)"
      primary: blue grey
      scheme: default
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode

    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      toggle:
        icon: material/brightness-4
        name: Switch to system preference

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            heading_level: 3
            merge_init_into_class: true
            show_symbol_type_heading: true
            show_symbol_type_toc: true
            show_root_heading: true
            show_source: true
            show_signature_annotations: true
            separate_signature: true

nav:
  - Overview: index.md
  - Getting Started:
      - Quick Start: getting_started/quickstart.md
      - Python SDK: getting_started/python_sdk.md
      - Runs: getting_started/runs.md
      - Metrics: getting_started/metrics.md
      - Tables: getting_started/tables.md
      - Remote Training: getting_started/remote_training.md
      - CLI Usage: getting_started/cli_usage.md
  - Architecture: architecture.md
  - API Documentation:
      - dalva: api_documentation/dalva_module.md
      - Run: api_documentation/run_class.md
      - Table: api_documentation/table_class.md

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - admonition
  - pymdownx.details
