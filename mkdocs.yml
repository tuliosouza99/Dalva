site_name: "Dalva Documentation"
site_description: "Lightweight experiment tracker for deep learning"
site_url: "https://github.com/tuliosouza99/Dalva"
repo_url: "https://github.com/tuliosouza99/Dalva"
repo_name: "tuliosouza99/Dalva"
edit_uri: "blob/main/docs/"

theme:
  name: "material"
  favicon: assets/favicon.png
  logo: assets/logo.svg
  features:
    - navigation.tabs
    - navigation.top
    - navigation.path
    - navigation.sections
    - announce.dismiss
    - content.code.copy
    - content.code.annotate
    - content.actions.view
  palette:
    - media: "(prefers-color-scheme)"
      toggle:
        icon: material/brightness-auto
        name: Switch to light mode

    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode

    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to system preference

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            heading_level: 3
            merge_init_into_class: true
            show_symbol_type_heading: true
            show_symbol_type_toc: true
            show_root_heading: true
            show_source: true
            show_signature_annotations: true
            separate_signature: true

nav:
  - Overview: index.md
  - Getting Started:
      - Quick Start: getting_started/quickstart.md
      - Python SDK: getting_started/python_sdk.md
      - Metrics & Value Types: getting_started/metrics_and_types.md
      - CLI Usage: getting_started/cli_usage.md
  - Architecture: architecture.md
  - API Documentation:
      - Python SDK:
          - init: api_documentation/python_sdk/init.md
          - Run Class: api_documentation/python_sdk/run_class.md
      - Models:
          - Config Models: api_documentation/models/config_models.md
          - Metric Models: api_documentation/models/metric_models.md
          - Project Models: api_documentation/models/project_models.md
          - Run Models: api_documentation/models/run_models.md
      - Database:
          - Connection: api_documentation/database/connection.md
          - Schema: api_documentation/database/schema.md
      - Services: api_documentation/services/logger.md
      - Config: api_documentation/config.md

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - admonition
  - pymdownx.details
