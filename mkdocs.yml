site_name: "TrackAI Documentation"
site_description: "Lightweight experiment tracker for deep learning"
site_url: "https://github.com/tuliosouza99/TrackAI"
repo_url: "https://github.com/tuliosouza99/TrackAI"
repo_name: "tuliosouza99/TrackAI"

theme:
  name: "material"
  custom_dir: docs/.overrides
  favicon: assets/favicon.png
  logo: assets/logo.svg
  features:
    - navigation.tabs
    - navigation.top
    - navigation.path
    - navigation.sections
    - announce.dismiss
    - content.code.copy
    - content.code.annotate
  palette:
    - media: "(prefers-color-scheme)"
      toggle:
        icon: material/brightness-auto
        name: Switch to light mode

    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode

    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to system preference

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            heading_level: 3
            merge_init_into_class: true
            show_symbol_type_heading: true
            show_symbol_type_toc: true
            show_root_heading: true
            show_source: true
            show_signature_annotations: true
            separate_signature: true

nav:
  - Overview: index.md
  - Getting Started:
    - Installation: getting_started/installation.md
    - Quick Start: getting_started/quickstart.md
    - Python SDK: getting_started/python_sdk.md
    - Resuming Runs: getting_started/resuming_runs.md
  - GitHub: https://github.com/tuliosouza99/TrackAI
